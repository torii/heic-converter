name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── libheif (macOS) ───────────────────────────
      - name: Install libheif (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake pkg-config libheif

      # ── libheif (Windows) ─────────────────────────
      - name: Cache vcpkg
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-libheif-${{ runner.os }}-static-md

      - name: Install libheif (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd C:/vcpkg
          git pull
          ./bootstrap-vcpkg.bat -disableMetrics
          ./vcpkg.exe install libheif:x64-windows-static-md --recurse
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
          echo "LIBHEIF_DIR=C:/vcpkg/installed/x64-windows-static-md" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static-md" >> $env:GITHUB_ENV
          echo "C:/vcpkg/installed/x64-windows-static-md/bin" >> $env:GITHUB_PATH

      - name: Install npm dependencies
        run: npm install

      # ── Tauri ビルド (macOS) ──────────────────────
      - name: Build Tauri app (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Tauri ビルド (Windows) ────────────────────
      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCPKG_ROOT: C:/vcpkg
          LIBHEIF_DIR: C:/vcpkg/installed/x64-windows-static-md
          VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

      # ── 成果物をアップロード (macOS) ──────────────
      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: HEIC-Converter-macOS
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      # ── 成果物をアップロード (Windows) ────────────
      # 単体EXE（インストール不要）をアップロード
      - name: Upload Windows artifact (portable EXE)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: HEIC-Converter-Windows-portable
          path: src-tauri/target/release/heic-converter.exe
          if-no-files-found: warn
