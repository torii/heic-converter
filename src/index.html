<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEIC Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --border2: #3c3c44;
    --accent: #e8ff5a;
    --accent2: #c0d445;
    --text: #f0f0ee;
    --muted: #77777f;
    --success: #4ade80;
    --error: #f87171;
    --radius: 6px;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-rows: 48px 1fr 52px;
    grid-template-columns: 1fr 220px;
    grid-template-areas:
      "header header"
      "main   sidebar"
      "footer footer";
    height: 100vh;
  }

  /* ── Header ── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .brand-mark {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 5px;
    display: grid;
    place-items: center;
  }

  .brand-mark svg { width: 14px; height: 14px; }

  .brand-name {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .brand-name em { color: var(--accent); font-style: normal; }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* ── Main (drop + list) ── */
  main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  /* Drop zone */
  .drop-zone {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 28px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.12s;
  }

  .drop-zone:hover,
  .drop-zone.over { background: rgba(232,255,90,0.035); }

  .dashed-border {
    position: absolute;
    inset: 12px;
    border: 1.5px dashed var(--border2);
    border-radius: 8px;
    pointer-events: none;
    transition: border-color 0.12s, opacity 0.12s;
  }

  .drop-zone.over .dashed-border,
  .drop-zone:hover .dashed-border { border-color: var(--accent); opacity: 0.45; }

  .drop-icon { color: var(--muted); transition: color 0.12s; }
  .drop-zone.over .drop-icon { color: var(--accent); }

  .drop-label {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    text-align: center;
  }

  .drop-sub {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }

  .btn-pick {
    margin-top: 4px;
    padding: 7px 16px;
    background: var(--accent);
    color: #0d0d0e;
    border: none;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s, transform 0.08s;
  }

  .btn-pick:hover { background: var(--accent2); }
  .btn-pick:active { transform: scale(0.96); }

  /* File list */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .list-count { color: var(--muted); }

  .btn-ghost {
    background: none;
    border: none;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.1s, background 0.1s;
  }

  .btn-ghost:hover { color: var(--error); background: rgba(248,113,113,0.08); }

  .list-scroll {
    flex: 1;
    overflow-y: auto;
  }

  .list-scroll::-webkit-scrollbar { width: 3px; }
  .list-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .file-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.08s;
  }

  .file-row:hover { background: var(--surface2); }

  .file-chip {
    width: 30px; height: 30px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    display: grid;
    place-items: center;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0;
    font-weight: 500;
    flex-shrink: 0;
  }

  .file-meta { flex: 1; min-width: 0; }

  .file-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .file-sub { color: var(--muted); font-size: 10px; margin-top: 1px; }

  .file-st {
    font-size: 13px;
    flex-shrink: 0;
    width: 16px;
    text-align: center;
  }

  .file-st.pending  { color: var(--border2); }
  .file-st.running  { color: var(--accent); animation: spin 0.8s linear infinite; display: inline-block; }
  .file-st.done     { color: var(--success); }
  .file-st.error    { color: var(--error); }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty drop hint inside list area */
  .empty-hint {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
  }

  /* ── Sidebar ── */
  aside {
    grid-area: sidebar;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .pane {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .pane-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Quality */
  .quality-big {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  .quality-big span { font-size: 14px; color: var(--muted); font-weight: 400; font-family: var(--mono); }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.25); }

  .range-hints {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--muted);
    margin-top: 5px;
  }

  /* Stats */
  .stat { display: flex; justify-content: space-between; padding: 3px 0; }
  .stat-k { color: var(--muted); }
  .stat-v { font-weight: 500; }
  .stat-v.g { color: var(--success); }
  .stat-v.r { color: var(--error); }
  .stat-v.a { color: var(--accent); }

  .prog-track {
    margin-top: 8px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.25s ease;
  }

  /* Log */
  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .log-area::-webkit-scrollbar { width: 3px; }
  .log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line {
    padding: 2px 16px;
    font-size: 10px;
    line-height: 1.55;
    color: var(--muted);
  }

  .log-line.ok   { color: var(--success); }
  .log-line.err  { color: var(--error); }
  .log-line.info { color: var(--accent); }

  /* ── Footer ── */
  footer {
    grid-area: footer;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    gap: 10px;
  }

  .btn-main {
    padding: 10px 28px;
    background: var(--accent);
    color: #0d0d0e;
    border: none;
    border-radius: var(--radius);
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.1s, transform 0.08s, opacity 0.1s;
  }

  .btn-main:hover:not(:disabled) { background: var(--accent2); }
  .btn-main:active:not(:disabled) { transform: scale(0.97); }

  .btn-main:disabled {
    background: var(--border2);
    color: var(--muted);
    cursor: not-allowed;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(50px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 11px;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.22s, opacity 0.22s;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.ok   { border-color: var(--success); color: var(--success); }
  .toast.ng   { border-color: var(--error);   color: var(--error); }
</style>
</head>
<body>
<div id="errdiv" style="position:fixed;bottom:0;left:0;right:0;background:red;color:white;font-size:11px;padding:4px;z-index:9999;display:none;white-space:pre-wrap;max-height:120px;overflow:auto"></div>
<script>
window.onerror = (msg,src,line,col,err) => {
  var d = document.getElementById('errdiv');
  d.style.display='block';
  d.textContent += '[ERROR] '+msg+' ('+line+':'+col+')\n';
};
window.onunhandledrejection = (e) => {
  var d = document.getElementById('errdiv');
  d.style.display='block';
  d.textContent += '[REJECT] '+e.reason+'\n';
};
</script>
<div class="app">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="7" height="9" rx="1" fill="#0d0d0e"/>
          <path d="M5 11.5h7M12 11.5L9.5 9M12 11.5L9.5 14" stroke="#0d0d0e" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">HEIC<em> → </em>JPG</span>
    </div>
    <span class="badge">依存ゼロ · 完全オフライン</span>
  </header>

  <!-- Main -->
  <main>
    <!-- Drop zone (always visible, shrinks when files added) -->
    <div class="drop-zone" id="dz">
      <div class="dashed-border"></div>
      <svg class="drop-icon" width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect x="5" y="3" width="17" height="22" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M17 3l7 7h-7V3z" fill="currentColor" opacity="0.25"/>
        <path d="M17 3v7h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="26" cy="26" r="7" fill="var(--bg)" stroke="currentColor" stroke-width="1.3"/>
        <path d="M26 22.5v7M22.5 26h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <div class="drop-label">HEICファイルをドロップ</div>
      <div class="drop-sub">複数ファイル対応 · Mac / Windows</div>
      <button class="btn-pick" id="btn-pick">ファイルを選択...</button>
    </div>

    <!-- File list (shown when files present) -->
    <div class="list-header" id="list-header" style="display:none">
      <span class="list-count" id="list-count">0 ファイル</span>
      <button class="btn-ghost" id="btn-clear">すべて削除</button>
    </div>

    <div class="list-scroll" id="list-scroll" style="display:none">
      <div id="file-rows"></div>
    </div>
  </main>

  <!-- Sidebar -->
  <aside>
    <!-- Quality -->
    <div class="pane">
      <div class="pane-label">JPG 品質</div>
      <div class="quality-big" id="q-num">90<span>%</span></div>
      <input type="range" id="q-slider" min="10" max="100" value="90">
      <div class="range-hints"><span>軽量</span><span>高品質</span></div>
    </div>

    <!-- Stats -->
    <div class="pane">
      <div class="pane-label">進捗</div>
      <div class="stat"><span class="stat-k">合計</span><span class="stat-v a" id="s-total">0</span></div>
      <div class="stat"><span class="stat-k">完了</span><span class="stat-v g" id="s-done">0</span></div>
      <div class="stat"><span class="stat-k">エラー</span><span class="stat-v r" id="s-err">0</span></div>
      <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
    </div>

    <!-- Log -->
    <div class="log-area" id="log"></div>
  </aside>

  <!-- Footer -->
  <footer>
    <button class="btn-main" id="btn-go" disabled>変換開始</button>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
  window.addEventListener('DOMContentLoaded', async () => {
  // Tauri v2: invoke を取得（複数の場所を試みる）
  for (let i = 0; i < 50; i++) {
    if (window.__TAURI_INTERNALS__?.invoke ||
        window.__TAURI__?.core?.invoke ||
        window.__TAURI__?.tauri?.invoke) break;
    await new Promise(r => setTimeout(r, 100));
  }
  const invoke = window.__TAURI_INTERNALS__?.invoke
    || window.__TAURI__?.core?.invoke
    || window.__TAURI__?.tauri?.invoke;
  if (!invoke) {
    document.getElementById('errdiv').style.display = 'block';
    document.getElementById('errdiv').textContent = 'Tauri invoke が見つかりません: ' + JSON.stringify(Object.keys(window).filter(k => k.includes('TAURI')));
    return;
  }


  // ── State ──────────────────────────────────────────
  let files = [];
  let busy  = false;

  // ── Elements ───────────────────────────────────────
  const dz         = document.getElementById('dz');
  const btnPick    = document.getElementById('btn-pick');
  const btnClear   = document.getElementById('btn-clear');
  const btnGo      = document.getElementById('btn-go');
  const listHeader = document.getElementById('list-header');
  const listScroll = document.getElementById('list-scroll');
  const listCount  = document.getElementById('list-count');
  const fileRows   = document.getElementById('file-rows');
  const qSlider    = document.getElementById('q-slider');
  const qNum       = document.getElementById('q-num');
  const sTotal     = document.getElementById('s-total');
  const sDone      = document.getElementById('s-done');
  const sErr       = document.getElementById('s-err');
  const prog       = document.getElementById('prog');
  const logEl      = document.getElementById('log');
  const toast      = document.getElementById('toast');

  // ── Quality slider ─────────────────────────────────
  qSlider.addEventListener('input', () => {
    qNum.innerHTML = qSlider.value + '<span>%</span>';
  });

  // ── Drag & drop ────────────────────────────────────
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); });

  // Tauri v2 ネイティブD&D（awaitを使わずPromiseで処理）
  try {
    const { getCurrentWindow } = window.__TAURI__.window;
    getCurrentWindow().onDragDropEvent((event) => {
      if (event.payload.type === 'over') {
        dz.classList.add('over');
      } else if (event.payload.type === 'drop') {
        dz.classList.remove('over');
        const paths = (event.payload.paths || [])
          .filter(p => p.toLowerCase().endsWith('.heic'));
        if (paths.length) addPaths(paths);
      } else {
        dz.classList.remove('over');
      }
    }).catch(e => console.warn('onDragDropEvent unavailable:', e));
  } catch(e) {
    console.warn('onDragDropEvent unavailable:', e);
  }

  // ── File picker ────────────────────────────────────
  btnPick.addEventListener('click', async () => {
    try {
      // dialogOpenが取得できない場合はTAURIの構造をログ表示
      // Tauri v2: plugin-dialog を invoke 経由で直接呼び出す
      const sel = await invoke('plugin:dialog|open', {
        options: {
          multiple: true,
          filters: [{ name: 'HEIC Images', extensions: ['heic', 'HEIC'] }]
        }
      });
      if (!sel) return;
      const paths = Array.isArray(sel) ? sel : [sel];
      addPaths(paths);
    } catch(e) {
      addLog('ダイアログエラー: ' + e, 'err');
    }
  });


  // ── Add files ──────────────────────────────────────
  function addPaths(paths) {
    const fresh = paths
      .filter(p => !files.find(f => f.path === p))
      .map(p => ({ path: p, name: p.replace(/.*[\\/]/, ''), status: 'pending' }));
    files.push(...fresh);
    render();
  }

  // ── Clear ──────────────────────────────────────────
  btnClear.addEventListener('click', () => {
    if (busy) return;
    files = [];
    clearLog();
    resetStats();
    render();
  });

  // ── Render ─────────────────────────────────────────
  function render() {
    const hasFiles = files.length > 0;
    listHeader.style.display = hasFiles ? 'flex' : 'none';
    listScroll.style.display = hasFiles ? 'block' : 'none';
    dz.style.flex = hasFiles ? '0 0 120px' : '1';

    listCount.textContent = files.length + ' ファイル';
    sTotal.textContent    = files.length;
    btnGo.disabled        = !hasFiles || busy;

    fileRows.innerHTML = files.map((f, i) => `
      <div class="file-row" id="row-${i}">
        <div class="file-chip">HEIC</div>
        <div class="file-meta">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-sub">${esc(f.path)}</div>
        </div>
        <span class="file-st ${f.status}" id="st-${i}">${icon(f.status)}</span>
      </div>
    `).join('');
  }

  function icon(s) {
    return s === 'pending' ? '○' : s === 'running' ? '↻' : s === 'done' ? '✓' : '✗';
  }

  function setStatus(i, s) {
    files[i].status = s;
    const el = document.getElementById('st-' + i);
    if (el) { el.className = 'file-st ' + s; el.textContent = icon(s); }
  }

  // ── Convert ────────────────────────────────────────
  btnGo.addEventListener('click', async () => {
    if (busy || files.length === 0) return;
    busy = true;
    btnGo.disabled    = true;
    btnGo.textContent = '変換中...';
    clearLog();
    resetStats();

    const quality = parseInt(qSlider.value);
    let done = 0, errs = 0;
    addLog('変換開始 — ' + files.length + 'ファイル / 品質' + quality + '%', 'info');

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      setStatus(i, 'running');

      const sep  = f.path.includes('\\') ? '\\' : '/';
      const dir  = f.path.includes('/') || f.path.includes('\\')
        ? f.path.substring(0, Math.max(f.path.lastIndexOf('/'), f.path.lastIndexOf('\\')))
        : '.';
      const outputDir = dir + sep + 'jpg_output';

      try {
        const res = await invoke('convert_heic', {
          inputPath: f.path,
          outputDir,
          quality,
        });
        if (res.success) {
          setStatus(i, 'done'); done++;
          files[i].outputDir = outputDir;
          addLog('✓ ' + f.name, 'ok');
        } else {
          setStatus(i, 'error'); errs++;
          addLog('✗ ' + f.name + ': ' + (res.error || '不明なエラー'), 'err');
        }
      } catch(e) {
        setStatus(i, 'error'); errs++;
        addLog('✗ ' + f.name + ': ' + e, 'err');
      }

      sDone.textContent = done;
      sErr.textContent  = errs;
      prog.style.width  = ((i + 1) / files.length * 100) + '%';
      document.getElementById('row-' + i)?.scrollIntoView({ block: 'nearest' });
    }

    busy = false;
    btnGo.textContent = '変換開始';
    btnGo.disabled    = false;

    // 出力フォルダのパスを収集（最初の成功ファイルから）
    const outDirs = [...new Set(files
      .filter(f => f.status === 'done' && f.outputDir)
      .map(f => f.outputDir))];

    if (errs === 0) {
      addLog('完了！ ' + done + ' ファイルを変換しました。', 'info');
      showToast(done + 'ファイルを変換完了！', 'ok');
    } else {
      addLog('完了: ' + done + ' 成功 / ' + errs + ' エラー', 'err');
      showToast(done + '成功 / ' + errs + 'エラー', 'ng');
    }

    // 出力フォルダリンクを表示
    for (const dir of outDirs) {
      addLogLink('📁 ' + dir, dir);
    }
  });

  // ── Log ────────────────────────────────────────────
  function addLog(msg, cls = '') {
    const d = document.createElement('div');
    d.className = 'log-line ' + cls;
    d.textContent = msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function addLogLink(label, dirPath) {
    const d = document.createElement('div');
    d.className = 'log-line info';
    d.style.cursor = 'pointer';
    d.style.textDecoration = 'underline';
    d.textContent = label;
    d.addEventListener('click', () => {
      // Tauri v2: ローカルフォルダをFinderで開く
      invoke('plugin:opener|open_path', { path: dirPath }).catch(() => {
        // フォールバック: shell経由
        invoke('plugin:shell|open', { path: 'file://' + dirPath });
      });
    });
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clearLog() { logEl.innerHTML = ''; }

  function resetStats() {
    sDone.textContent = sErr.textContent = '0';
    prog.style.width = '0%';
  }

  // ── Toast ──────────────────────────────────────────
  let toastT;
  function showToast(msg, cls = '') {
    toast.textContent = msg;
    toast.className = 'toast ' + cls + ' show';
    clearTimeout(toastT);
    toastT = setTimeout(() => { toast.className = 'toast ' + cls; }, 3000);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  }); // end DOMContentLoaded
</script>
</body>
</html>
